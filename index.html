<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mon calculator</title>
</head>
<body style="margin-left: 24%;">
    <input type="number" class="kg-display" readonly placeholder="enter total kgs.."><br><br>
    <input  class="mon-display" readonly placeholder="results here.."><br><br>
    
    <button class="button">7</button>
    <button class="button">8</button>
    <button class="button">9</button><br>
    <button class="button">4</button>
    <button class="button">5</button>
    <button class="button">6</button><br>
    <button class="button">1</button>
    <button class="button">2</button>
    <button class="button">3</button><br>
    <button class="button">0</button>
    <button id="equalBtn">=</button>
    <button id="clearBtn">C</button>


    
    <script src="script.js"></script>
</body>
</html>
